# =============================================================================
# The Answer Protocol — World Data
#
# Map layout (10 rooms):
#
#                 garden
#                   |
#   start ──────── market ──────── tavern
#     │              │
#   smithy ──────── gate ──────── entrance ── hall ── vault ── crypt
#
#   Loop:    start → market → gate → smithy → start
#   Branches: garden (off start), tavern (off market),
#             and the whole dungeon chain (off gate, east).
#
# NPC roles (3 distinct, as required by the subject):
#   - dialogue   : barkeep, blacksmith         (peaceful, flavour text)
#   - quest-giver: captain, merchant           (peaceful, hand out quests)
#   - enemy      : skeleton_* (hostile, killable in the dungeon)
#
# `hostile: false` makes an NPC reject ATTACK with 405 NPC_NOT_HOSTILE.
# =============================================================================

world:
  locations:
    start:
      name: "Village Square"
      description: "A sunlit cobblestone square. A stone fountain trickles at its centre, and roads branch off in every direction. This is the safest spot for miles."
      exits:
        north: "garden"
        east: "market"
        south: "smithy"
      spawns:
        - npc_type: "captain"
          count: 1

    garden:
      name: "Herb Garden"
      description: "A walled garden hemmed by tall hedges. Rows of fragrant herbs sway between flagstone paths."
      exits:
        south: "start"
      items:
        - "herbs"

    market:
      name: "Market Row"
      description: "A bustling row of timber stalls. Traders hawk bread, cloth, and trinkets over the clatter of carts."
      exits:
        west: "start"
        east: "tavern"
        south: "gate"
      spawns:
        - npc_type: "merchant"
          count: 1
      items:
        - "herbs"
        - "bread"

    tavern:
      name: "The Salty Mug"
      description: "A low-beamed tavern thick with hearth-smoke and laughter. A barkeep polishes mugs behind the counter."
      exits:
        west: "market"
      spawns:
        - npc_type: "barkeep"
          count: 1
      items:
        - "ale"

    smithy:
      name: "Ember Forge"
      description: "A blacksmith's yard ringing with hammer-blows. A wheel of spare iron leans against stacked planks."
      exits:
        north: "start"
        east: "gate"
      spawns:
        - npc_type: "blacksmith"
          count: 1
      items:
        - "sword"
        - "shield"

    gate:
      name: "The Old Gate"
      description: "A crumbling stone arch marks the edge of the village. Beyond it, a black stairway descends into the dungeon."
      exits:
        north: "market"
        west: "smithy"
        east: "entrance"

    entrance:
      name: "Dungeon Entrance"
      description: "A torch-lit antechamber. Damp stone walls echo with distant skittering."
      exits:
        west: "gate"
        north: "hall"
      spawns:
        - npc_type: "skeleton_warrior"
          count: 1
      items:
        - "torch"
        - "dagger"

    hall:
      name: "Pillared Hall"
      description: "A long hall lined with cracked pillars. Bones litter the floor."
      exits:
        south: "entrance"
        east: "vault"
      spawns:
        - npc_type: "skeleton_rogue"
          count: 2
      items:
        - "bone_dust"
        - "axe"

    vault:
      name: "Forgotten Vault"
      description: "A small vault. A heavy iron chest squats in the centre beneath a ribbed ceiling."
      exits:
        west: "hall"
        south: "crypt"
      spawns:
        - npc_type: "skeleton_mage"
          count: 1
      items:
        - "ancient_coin"
        - "staff"

    crypt:
      name: "Sealed Crypt"
      description: "A dead-end crypt sealed for centuries. A single rogue skeleton guards a dusty wand."
      exits:
        north: "vault"
      spawns:
        - npc_type: "skeleton_rogue"
          count: 1
      items:
        - "wand"

  items:
    herbs:
      name: "Healing Herbs"
      obtainable: true

    bread:
      name: "Loaf of Bread"
      obtainable: true

    ale:
      name: "Frothy Ale"
      obtainable: true

    sword:
      name: "Iron Sword"
      obtainable: true

    shield:
      name: "Wooden Shield"
      obtainable: true

    dagger:
      name: "Rusted Dagger"
      obtainable: true

    axe:
      name: "Chipped Axe"
      obtainable: true

    staff:
      name: "Ember Staff"
      obtainable: true

    wand:
      name: "Ashen Wand"
      obtainable: true

    torch:
      name: "Burning Torch"
      obtainable: true

    bone_dust:
      name: "Bone Dust"
      obtainable: true

    ancient_coin:
      name: "Ancient Coin"
      obtainable: true

  npcs:
    # -- quest-givers (peaceful) ---------------------------------------------
    captain:
      name: "Captain Aldric"
      description: "The grizzled captain of the village watch, scarred and stern."
      model: "warrior"
      hostile: false
      dialogue:
        - "The dungeon past the gate crawls with the restless dead."
        - "Thin out the rogues in the hall and I'll see you rewarded."
      stats:
        hp: 40
        attack: 0
      quests:
        - "clear_hall"
        - "silence_mage"

    merchant:
      name: "Merchant Bo"
      description: "A round, cheerful trader with an eye for a bargain."
      model: "rogue"
      hostile: false
      dialogue:
        - "Welcome, welcome! Finest wares this side of the gate."
        - "Bring me a couple of healing herbs and I'll make it worth your while."
      stats:
        hp: 20
        attack: 0
      quests:
        - "gather_herbs"

    # -- dialogue NPCs (peaceful) --------------------------------------------
    barkeep:
      name: "Barkeep Mira"
      description: "A sharp-tongued barkeep who hears every rumour in the realm."
      model: "mage"
      hostile: false
      dialogue:
        - "Sit anywhere, traveller. First mug's on the house."
        - "They say the mage in the vault never truly died."
      stats:
        hp: 20
        attack: 0

    blacksmith:
      name: "Blacksmith Goran"
      description: "A broad-shouldered smith, soot-streaked and quietly proud of his work."
      model: "warrior"
      hostile: false
      dialogue:
        - "Take a blade from the rack if you mean to fight."
        - "Iron's no good to you unequipped — wield it."
      stats:
        hp: 40
        attack: 0

    # -- enemies (hostile) ----------------------------------------------------
    skeleton_warrior:
      name: "Skeleton Warrior"
      description: "An armored skeleton clutching a rusted axe."
      model: "warrior"
      dialogue:
        - "*the skeleton rattles its bones*"
      stats:
        hp: 18
        attack: 4

    skeleton_rogue:
      name: "Skeleton Rogue"
      description: "A nimble skeleton with a curved blade."
      model: "rogue"
      dialogue:
        - "*hisses through fleshless teeth*"
      stats:
        hp: 12
        attack: 5

    skeleton_mage:
      name: "Skeleton Mage"
      description: "A robed skeleton, ember-eyed, gripping a staff."
      model: "mage"
      dialogue:
        - "*chants in a forgotten tongue*"
      stats:
        hp: 14
        attack: 6

  quests:
    clear_hall:
      name: "Clear the Hall"
      description: "Destroy the two rogue skeletons haunting the pillared hall."
      objective:
        kind: kill
        target: skeleton_rogue
        count: 2
      reward:
        xp: 100

    silence_mage:
      name: "Silence the Mage"
      description: "Bring the skeleton mage in the vault to its final rest."
      objective:
        kind: kill
        target: skeleton_mage
        count: 1
      reward:
        xp: 150

    gather_herbs:
      name: "Gather Herbs"
      description: "Collect two bundles of healing herbs for Merchant Bo."
      objective:
        kind: collect
        target: herbs
        count: 2
      reward:
        xp: 60

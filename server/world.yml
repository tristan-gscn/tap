world:
  locations:
    start:
      name: "Dungeon Entrance"
      description: "A torch-lit antechamber. Damp stone walls echo with distant skittering."
      kind: "dungeon"
      exits:
        north: "hall"
      spawns:
        - npc_type: "skeleton_warrior"
          count: 1
      items:
        - "torch"
        - "sword"
        - "shield"
        - "dagger"

    hall:
      name: "Pillared Hall"
      description: "A long hall lined with cracked pillars. Bones litter the floor."
      kind: "dungeon"
      exits:
        south: "start"
        east: "vault"
      spawns:
        - npc_type: "skeleton_rogue"
          count: 2
      items:
        - "bone_dust"
        - "axe"
        - "bow"

    vault:
      name: "Forgotten Vault"
      description: "A small vault. A heavy iron chest squats in the center."
      kind: "dungeon"
      exits:
        west: "hall"
      spawns:
        - npc_type: "skeleton_mage"
          count: 1
      items:
        - "ancient_coin"
        - "wand"
        - "staff"
        - "crossbow"

  items:
    torch:
      name: "Burning Torch"
      description: "A pitch-soaked torch, still alight."
      obtainable: true

    sword:
      name: "Iron Sword"
      description: "A simple blade, but it bites."
      obtainable: true

    shield:
      name: "Wooden Shield"
      description: "A battered shield, still sturdy."
      obtainable: true

    dagger:
      name: "Rusted Dagger"
      description: "A short blade with a wicked point."
      obtainable: true

    axe:
      name: "Chipped Axe"
      description: "A heavy axe, dulled by time."
      obtainable: true

    bow:
      name: "Hunter's Bow"
      description: "A bent bow with a frayed string."
      obtainable: true

    crossbow:
      name: "Old Crossbow"
      description: "A compact crossbow with worn limbs."
      obtainable: true

    wand:
      name: "Ashen Wand"
      description: "A thin wand, warm to the touch."
      obtainable: true

    staff:
      name: "Ember Staff"
      description: "A tall staff capped with a faintly glowing crystal."
      obtainable: true

    bone_dust:
      name: "Bone Dust"
      description: "A handful of powdered bone. Useful for alchemy."
      obtainable: true

    ancient_coin:
      name: "Ancient Coin"
      description: "A tarnished coin from a forgotten realm."
      obtainable: true

  npcs:
    skeleton_warrior:
      name: "Skeleton Warrior"
      description: "An armored skeleton clutching a rusted axe."
      model: "warrior"
      dialogue:
        - "*the skeleton rattles its bones*"
      stats:
        hp: 18
        attack: 4
      quests:
        - "clear_hall"

    skeleton_rogue:
      name: "Skeleton Rogue"
      description: "A nimble skeleton with a curved blade."
      model: "rogue"
      dialogue:
        - "*hisses through fleshless teeth*"
      stats:
        hp: 12
        attack: 5

    skeleton_mage:
      name: "Skeleton Mage"
      description: "A robed skeleton, ember-eyed, gripping a staff."
      model: "mage"
      dialogue:
        - "*chants in a forgotten tongue*"
      stats:
        hp: 14
        attack: 6
      quests:
        - "vault_clear"

  quests:
    clear_hall:
      name: "Clear the Hall"
      description: "Destroy the rogue skeletons haunting the pillared hall."
      objective:
        kind: kill
        target: skeleton_rogue
        count: 2
      reward:
        xp: 100

    vault_clear:
      name: "Silence the Mage"
      description: "Bring the skeleton mage to its final rest."
      objective:
        kind: kill
        target: skeleton_mage
        count: 1
      reward:
        xp: 150

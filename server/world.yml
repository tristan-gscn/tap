world:
  locations:
    start:
      name: "Village Square"
      description: "A bustling square with cobblestone paths."
      exits:
        north: "tavern"
        east: "shop"
      spawns:
        - npc_type: "guard"
          count: 1
      items:
        - "herbs"
        - "lantern"

    tavern:
      name: "The Prancing Pony"
      description: "A cozy tavern filled with warmth and laughter."
      exits:
        south: "start"
        north: "cellar"
      items:
        - "ale"

    cellar:
      name: "Dark Cellar"
      description: "A damp cellar crawling with vermin."
      exits:
        south: "tavern"
      spawns:
        - npc_type: "rat"
          count: 3

    shop:
      name: "General Store"
      description: "Shelves lined with various goods and supplies."
      exits:
        west: "start"
      spawns:
        - npc_type: "merchant"
          count: 1

  items:
    ale:
      name: "Frothy Ale"
      description: "A refreshing drink that restores energy."
      obtainable: true

    herbs:
      name: "Healing Herbs"
      description: "A small bundle of fragrant medicinal herbs."
      obtainable: true

    lantern:
      name: "Old Lantern"
      description: "A rusty lantern that still gives a faint light."
      obtainable: true

  npcs:
    guard:
      name: "Village Guard"
      description: "A stern-looking guard watching over the square."
      dialogue:
        - "Stay safe, traveler."
        - "The roads can be dangerous."
      stats:
        hp: 20
        attack: 4

    merchant:
      name: "Shop Keeper"
      description: "A friendly merchant eager to trade."
      dialogue:
        - "Welcome to my shop!"
        - "What can I get for you today?"
      stats:
        hp: 15
        attack: 0

    rat:
      name: "Giant Rat"
      description: "A mangy rat the size of a dog."
      dialogue:
        - "*hisses*"
      stats:
        hp: 12
        attack: 3

  quests:
    herb_gathering:
      name: "Herb Gathering"
      description: "Collect healing herbs for the village guard."
      objective:
        kind: collect
        target: herbs
        count: 1
      reward:
        xp: 50

    pest_control:
      name: "Pest Control"
      description: "Clear the cellar of giant rats."
      objective:
        kind: kill
        target: rat
        count: 3
      reward:
        xp: 120